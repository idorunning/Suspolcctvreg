services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: suspol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suspol}
      POSTGRES_DB: suspolcctvreg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [internal]

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [postgres]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://suspol:${POSTGRES_PASSWORD:-suspol}@postgres:5432/suspolcctvreg
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-28800}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      LDAP_URL: ${LDAP_URL}
      LDAP_BIND_DN: ${LDAP_BIND_DN}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_SEARCH_BASE: ${LDAP_SEARCH_BASE}
      LDAP_SEARCH_FILTER: ${LDAP_SEARCH_FILTER}
      LDAP_USER_GROUP_DNS: ${LDAP_USER_GROUP_DNS:-}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL}
    networks: [internal]
    command: sh -c "npm run migrate && node dist/index.js"

  tileserver:
    image: maptiler/tileserver-gl:latest
    restart: unless-stopped
    command: ["-p", "8080", "--public_url", "/tiles/"]
    volumes:
      # Drop an MBTiles file and a style JSON in ./tiles before first boot.
      # See README.md "Running on-premises" for sourcing/generating MBTiles.
      - ./tiles:/data
    networks: [internal]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on: [backend, tileserver]
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks: [internal]

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
