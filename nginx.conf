worker_processes auto;
events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # Upstreams resolve via Docker's internal DNS.
  upstream backend    { server backend:4000; }
  upstream tileserver { server tileserver:8080; }

  server {
    listen 80 default_server;
    server_name _;

    # Strict same-origin CSP; blocks every external origin the app used to
    # talk to (Google/Firebase, OSM tile CDN, cdnjs Leaflet markers).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback.
    location / {
      try_files $uri /index.html;
    }

    # API proxy.
    location /api/ {
      proxy_pass         http://backend/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Server-Sent Events stream: disable buffering so events reach clients promptly.
    location /api/cameras/stream {
      proxy_pass            http://backend/api/cameras/stream;
      proxy_http_version    1.1;
      proxy_set_header      Host $host;
      proxy_set_header      Connection '';
      proxy_buffering       off;
      proxy_cache           off;
      proxy_read_timeout    1h;
    }

    # Self-hosted OSM vector/raster tiles.
    location /tiles/ {
      proxy_pass         http://tileserver/styles/basic-preview/;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      expires            7d;
    }
  }
}
